services:
  # Frontend Service - Next.js App
  - type: web
    name: dosyaindir-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
        defaultValue: https://dosyaindir-frontend.onrender.com
      - key: MAX_FILE_SIZE
        sync: false
        defaultValue: "5368709120"
      - key: CHUNK_SIZE
        sync: false
        defaultValue: "5242880"
      - key: NEXT_PUBLIC_API_URL
        sync: false
        defaultValue: https://dosyaindir-backend.onrender.com

  # Backend Service - API Routes (Same Next.js app, separate instance)
  - type: web
    name: dosyaindir-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
        defaultValue: https://dosyaindir-backend.onrender.com
      - key: MAX_FILE_SIZE
        sync: false
        defaultValue: "5368709120"
      - key: CHUNK_SIZE
        sync: false
        defaultValue: "5242880"
