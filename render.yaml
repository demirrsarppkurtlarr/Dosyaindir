services:
  # Single Service - Next.js App with API Routes
  - type: web
    name: dosyaindir
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
        defaultValue: https://dosyaindir.onrender.com
      - key: MAX_FILE_SIZE
        sync: false
        defaultValue: "2147483648"
      - key: CHUNK_SIZE
        sync: false
        defaultValue: "5242880"
